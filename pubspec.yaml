name: dalleni
description: "Dalleni mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.2.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  pin_code_fields: 8.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
    - assets/images/
  fonts:
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
        - asset: assets/fonts/Caveat-Bold.ttf
          weight: 700
    - family: PlaypenSansArabic
      fonts:
        - asset: assets/fonts/PlaypenSansArabic-Regular.ttf
        - asset: assets/fonts/PlaypenSansArabic-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
